<!DOCTYPE html>
<html lang="he">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sensei FR • Official Hub</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:"Space Grotesk",sans-serif;
background:#050505;
color:white;
}

canvas{
position:fixed;
inset:0;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(120,120,120,.25), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,255,255,.08), transparent 45%),
radial-gradient(circle at 50% 100%, rgba(80,80,80,.25), transparent 55%);
animation:move 16s ease-in-out infinite;
}

@keyframes move{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

.noise{
position:fixed;
inset:0;
opacity:.05;
pointer-events:none;
background-image:url("https://www.transparenttextures.com/patterns/noise.png");
}

body{
display:flex;
justify-content:center;
align-items:center;
}

/* ===== CARD ===== */
.card{
position:relative;
z-index:5;
width:min(520px,92vw);
padding:34px;
border-radius:28px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(45px);
border:1px solid rgba(255,255,255,.12);
text-align:center;
box-shadow:0 0 100px rgba(255,255,255,.05);
}

.avatar{
width:140px;
height:140px;
margin:auto;
border-radius:50%;
background:conic-gradient(#fff,#444,#fff);
animation:spin 12s linear infinite;
cursor:pointer;
padding:6px;
}

.avatar img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.title{
font-size:44px;
margin-top:16px;
}

.bio{
opacity:.6;
margin-bottom:24px;
}

/* ===== LINKS (UNIFIED STYLE) ===== */
.link{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
height:58px;
margin:10px 0;
border-radius:16px;
text-decoration:none;
color:white;
font-weight:700;
font-size:15px;

background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);

transition:.25s;
position:relative;
overflow:hidden;
}

.link::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
transition:.5s;
}

.link:hover::before{
left:120%;
}

.link i{
font-size:20px;
min-width:22px;
color:white;
}

.link:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 25px rgba(255,255,255,.12);
background:rgba(255,255,255,.06);
}

/* ===== LOADER ===== */
.loader{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
z-index:999;
}

.loader img{
width:190px;
height:190px;
border-radius:50%;
filter:drop-shadow(0 0 30px white);
animation:pop 1s ease forwards;
}

@keyframes pop{
from{transform:scale(.4);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.loader.exit{
animation:out .7s ease forwards;
}

@keyframes out{
to{transform:translateX(120%);opacity:0;}
}

</style>
</head>

<body>

<canvas id="c1"></canvas>
<div class="bg"></div>
<div class="noise"></div>

<div class="loader" id="loader">
<img src="logo.png">
</div>

<div class="card">

<div class="avatar">
<img src="logo.png">
</div>

<div class="title">Sensei FR</div>
<div class="bio">Creator • Streams • Community</div>

<a class="link" href="https://www.youtube.com/@senseifrfr" target="_blank">
<i class="fa-brands fa-youtube"></i><span>YouTube Main</span>
</a>

<a class="link" href="https://www.youtube.com/@senseifr-livestream" target="_blank">
<i class="fa-solid fa-video"></i><span>Clips Channel</span>
</a>

<a class="link" href="https://kick.com/sensei_fr" target="_blank">
<i class="fa-solid fa-bolt"></i><span>Kick</span>
</a>

<a class="link" href="https://www.instagram.com/yairfr12/" target="_blank">
<i class="fa-brands fa-instagram"></i><span>Instagram</span>
</a>

<a class="link" href="https://discord.com/invite/Eqx7858MVn" target="_blank">
<i class="fa-brands fa-discord"></i><span>Discord</span>
</a>

<a class="link" href="https://www.tiktok.com/@sense1_fr" target="_blank">
<i class="fa-brands fa-tiktok"></i><span>TikTok</span>
</a>

<a class="link" href="https://streamelements.com/sense1_fr/tip" target="_blank">
<i class="fa-brands fa-paypal"></i><span>Tip Sensei</span>
</a>

</div>

<script>

const links = [
"https://www.youtube.com/@senseifrfr",
"https://www.youtube.com/@senseifr-livestream",
"https://kick.com/sensei_fr",
"https://www.instagram.com/yairfr12/",
"https://discord.com/invite/Eqx7858MVn",
"https://www.tiktok.com/@sense1_fr",
"https://streamelements.com/sense1_fr/tip"
];

let i = 0;

function initLogo(){
const avatar = document.querySelector(".avatar");

avatar.addEventListener("click",()=>{
window.open(links[i],"_blank");
i = (i + 1) % links.length;
});
}

window.addEventListener("load",()=>{

const loader=document.getElementById("loader");

setTimeout(()=>{
loader.classList.add("exit");

setTimeout(()=>{
loader.style.display="none";
initLogo();
startParticles();
},700);

},1200);

});

const c = document.getElementById("c1");
const ctx = c.getContext("2d");

let w,h;

function resize(){
w = innerWidth;
h = innerHeight;
c.width = w;
c.height = h;
}

resize();
addEventListener("resize",resize);

const p = Array.from({length:80},() => ({
x:Math.random()*w,
y:Math.random()*h,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
}));

function startParticles(){
function loop(){
ctx.clearRect(0,0,w,h);

for(let n of p){
n.x += n.vx;
n.y += n.vy;

if(n.x < 0 || n.x > w) n.vx *= -1;
if(n.y < 0 || n.y > h) n.vy *= -1;

ctx.fillStyle="white";
ctx.fillRect(n.x,n.y,2,2);
}

requestAnimationFrame(loop);
}
loop();
}

</script>

</body>
</html>
